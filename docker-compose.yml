version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: settlement-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: settlement
      MYSQL_USER: settlement
      MYSQL_PASSWORD: settlement123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: settlement-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/settlement?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: settlement
      SPRING_DATASOURCE_PASSWORD: settlement123
      SERVER_PORT: "8080"
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  mysql_data:
